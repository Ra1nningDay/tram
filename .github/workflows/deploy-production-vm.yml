name: Deploy Production To VM

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          image_name="$(echo "${{ env.REGISTRY }}/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          image_tag="${GITHUB_SHA}"
          echo "image_name=${image_name}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_PORT: ${{ secrets.VM_PORT }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_DEPLOY_PATH: ${{ secrets.VM_DEPLOY_PATH }}
      VM_SSH_KNOWN_HOSTS: ${{ secrets.VM_SSH_KNOWN_HOSTS }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
      IMAGE_NAME: ${{ needs.build-and-push.outputs.image_name }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [ -n "${VM_SSH_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${VM_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${VM_PORT:-22}" "${VM_HOST}" >> ~/.ssh/known_hosts
          fi

      - name: Upload runtime env
        shell: bash
        run: |
          deploy_path="${VM_DEPLOY_PATH:-/opt/tram}"
          printf '%s' "${APP_ENV_FILE}" > runtime.env
          ssh -p "${VM_PORT:-22}" "${VM_USER}@${VM_HOST}" "mkdir -p '${deploy_path}'"
          scp -P "${VM_PORT:-22}" runtime.env "${VM_USER}@${VM_HOST}:${deploy_path}/.env"

      - name: Upload compose file
        shell: bash
        run: |
          deploy_path="${VM_DEPLOY_PATH:-/opt/tram}"
          scp -P "${VM_PORT:-22}" docker-compose.yml "${VM_USER}@${VM_HOST}:${deploy_path}/docker-compose.yml"

      - name: Pull and restart production stack
        shell: bash
        run: |
          deploy_path="${VM_DEPLOY_PATH:-/opt/tram}"
          ssh -p "${VM_PORT:-22}" "${VM_USER}@${VM_HOST}" "
            set -eu
            mkdir -p '${deploy_path}'
            cd '${deploy_path}'
            cp .env .compose.env
            printf '\\nIMAGE_NAME=%s\\nIMAGE_TAG=%s\\n' '${IMAGE_NAME}' '${IMAGE_TAG}' >> .compose.env
            echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin
            docker compose --env-file .compose.env pull
            docker compose --env-file .compose.env up -d --no-build --remove-orphans
          "
