name: Publish Production Deploy State

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          image_name="$(echo "${{ env.REGISTRY }}/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          image_tag="${GITHUB_SHA}"
          echo "image_name=${image_name}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-deploy-state:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    env:
      IMAGE_NAME: ${{ needs.build-and-push.outputs.image_name }}
      IMAGE_DIGEST: ${{ needs.build-and-push.outputs.image_digest }}
      SOURCE_SHA: ${{ github.sha }}
      DEPLOY_BRANCH: deploy-state
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish runtime bundle to deploy-state
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          state_dir="${RUNNER_TEMP}/deploy-state"
          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          image_ref="${IMAGE_NAME}@${IMAGE_DIGEST}"
          updated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if git ls-remote --exit-code --heads "${repo_url}" "${DEPLOY_BRANCH}" >/dev/null 2>&1; then
            git clone --branch "${DEPLOY_BRANCH}" --depth 1 "${repo_url}" "${state_dir}"
          else
            git clone --depth 1 "${repo_url}" "${state_dir}"
            git -C "${state_dir}" checkout --orphan "${DEPLOY_BRANCH}"
            git -C "${state_dir}" rm -rf . >/dev/null 2>&1 || true
            git -C "${state_dir}" clean -fdx
          fi

          mkdir -p "${state_dir}/production"
          rsync -a --delete deploy/production/ "${state_dir}/production/"
          {
            printf 'IMAGE_REF=%s\n' "${image_ref}"
            printf 'SOURCE_SHA=%s\n' "${SOURCE_SHA}"
            printf 'UPDATED_AT=%s\n' "${updated_at}"
          } > "${state_dir}/production/manifest.env"

          git -C "${state_dir}" config user.name "github-actions[bot]"
          git -C "${state_dir}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${state_dir}" add production

          if git -C "${state_dir}" diff --cached --quiet; then
            echo "deploy-state is already up to date"
            exit 0
          fi

          git -C "${state_dir}" commit -m "chore: publish production deploy state for ${SOURCE_SHA}"
          git -C "${state_dir}" push origin "${DEPLOY_BRANCH}"
