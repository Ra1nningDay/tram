name: tram

services:
  redis:
    image: redis:7-alpine
    container_name: tram-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    container_name: tram-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tram}
      POSTGRES_USER: ${POSTGRES_USER:-tram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tram-local-password}
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-tram} -d ${POSTGRES_DB:-tram}
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  app:
    image: ${IMAGE_REF:?IMAGE_REF must be set}
    container_name: tram-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE must be set}
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://tram:tram-local-password@postgres:5432/tram?schema=public}
      DIRECT_URL: ${DIRECT_URL:-postgresql://tram:tram-local-password@postgres:5432/tram?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${PORT:-3000}:3000"

volumes:
  postgres-data:
  redis-data:
